name: validate

on:
  push:
  pull_request:

jobs:
  source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Repository safety
        run: node scripts/check-repository.mjs
      - name: Static validations
        run: node tests/run-all.mjs
      - name: Shell syntax
        run: |
          for file in scripts/*.sh apps/weread-move/*.sh; do
            bash -n "$file"
          done
